<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invictus Fitness — Премиальные фитнес-клубы в Алматы</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111010;
  --bg2:#0a0a0a;
  --bg3:#181818;
  --bg4:#1f1f1f;
  --text:#ffffff;
  --text-dim:#888;
  --text-mid:#bbb;
  --border:rgba(255,255,255,0.1);
  --font-h:'Barlow Condensed',sans-serif;
  --font-b:'Barlow',sans-serif;
  --max:1200px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:16px;line-height:1.6;overflow-x:hidden}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;gap:40px;
  padding:0 40px;height:56px;
  background:rgba(10,10,10,0.96);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.nav-logo{
  font-family:var(--font-h);font-size:20px;font-weight:800;
  font-style:italic;letter-spacing:.04em;text-transform:uppercase;
  color:var(--text);text-decoration:none;flex-shrink:0;
}
.nav-links{display:flex;gap:24px;flex:1}
.nav-links a{
  font-family:var(--font-b);font-size:13px;font-weight:400;
  color:var(--text-dim);text-decoration:none;letter-spacing:.02em;
  transition:color .15s;white-space:nowrap;
}
.nav-links a:hover{color:#fff}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-btn-out{
  background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff;
  font-family:var(--font-b);font-size:13px;font-weight:400;
  padding:8px 18px;cursor:pointer;letter-spacing:.02em;transition:all .15s;white-space:nowrap;
}
.nav-btn-out:hover{border-color:#fff}
.nav-btn-fill{
  background:#fff;border:none;color:#000;
  font-family:var(--font-b);font-size:13px;font-weight:500;
  padding:8px 18px;cursor:pointer;letter-spacing:.02em;transition:all .15s;white-space:nowrap;
}
.nav-btn-fill:hover{background:#e0e0e0}

/* LAYOUT */
.wrap{max-width:var(--max);margin:0 auto;padding:0 40px}
section{width:100%}

/* HERO */
#hero{
  position:relative;height:100vh;min-height:680px;
  display:flex;align-items:center;
  overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 80% at 50% 40%, #2a2a2a 0%, #111010 60%, #080808 100%);
}
.hero-dots{
  position:absolute;inset:0;opacity:.25;
  background-image:radial-gradient(circle, #fff 1px, transparent 1px);
  background-size:28px 28px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 60%,var(--bg) 100%)}
.hero-content{
  position:relative;z-index:2;text-align:left;
  padding:0 56px;max-width:640px;
}
.hero-eyebrow{
  font-family:var(--font-b);font-size:13px;font-weight:400;
  letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);
  margin-bottom:28px;
}
.hero-h1{
  font-family:var(--font-h);font-size:clamp(28px,3vw,44px);font-weight:800;
  font-style:italic;line-height:1.1;letter-spacing:-.01em;
  text-transform:uppercase;color:#fff;margin-bottom:14px;
}
.hero-sub{
  font-family:var(--font-b);font-size:17px;font-weight:300;
  color:var(--text-dim);margin-bottom:8px;
}
.hero-sub2{
  font-family:var(--font-b);font-size:14px;font-weight:300;
  color:#666;margin-bottom:44px;letter-spacing:.02em;
}
/* hero form inline */
.hero-form{
  display:flex;flex-direction:column;align-items:stretch;gap:10px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  padding:24px 28px;max-width:360px;width:100%;
}
.hero-form-title{
  font-family:var(--font-h);font-size:16px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--text-mid);
  align-self:flex-start;
}
.hero-hint{font-size:12px;color:#555;line-height:1.5;text-align:center}

/* FORMS */
.f-input{
  width:100%;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;font-family:var(--font-b);font-size:15px;
  padding:13px 16px;outline:none;transition:border-color .15s;
}
.f-input::placeholder{color:#555}
.f-input:focus{border-color:rgba(255,255,255,0.4)}
.f-btn{
  width:100%;background:#fff;border:none;color:#000;
  font-family:var(--font-h);font-size:15px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  padding:14px 24px;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.f-btn:hover{background:#e0e0e0}
.f-success{text-align:center;padding:16px 0;width:100%}
.f-success-icon{font-size:28px;color:#fff;margin-bottom:8px}
.f-success-title{
  font-family:var(--font-h);font-size:24px;font-weight:700;
  text-transform:uppercase;color:#fff;margin-bottom:4px;
}
.f-success-sub{font-size:13px;color:var(--text-dim)}

/* TRUST BAR */
#trust{
  background:var(--bg2);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:0;
}
.trust-row{display:grid;grid-template-columns:repeat(4,1fr)}
.trust-cell{
  text-align:center;padding:44px 24px;
  border-right:1px solid var(--border);
}
.trust-cell:last-child{border-right:none}
.trust-n{
  font-family:var(--font-h);font-size:clamp(48px,4.5vw,72px);
  font-weight:800;font-style:italic;line-height:1;color:#fff;
  letter-spacing:-.02em;
}
.trust-l{
  font-size:12px;color:var(--text-dim);
  letter-spacing:.1em;text-transform:uppercase;margin-top:8px;
}

/* SLOT COUNTER */
.slot-counter{display:inline-flex;align-items:baseline;gap:1px;overflow:hidden}
.slot-digit-wrap{
  display:inline-block;overflow:hidden;
  height:1em;line-height:1;vertical-align:baseline;
  position:relative;
}
.slot-digit-inner{
  display:flex;flex-direction:column;
  transition:transform 0.55s cubic-bezier(0.22,1,0.36,1);
  will-change:transform;
}
.slot-digit-inner span{
  display:block;height:1em;line-height:1;
  text-align:center;
}
.slot-sep{
  display:inline-block;
  font-family:var(--font-h);font-size:clamp(48px,4.5vw,72px);
  font-weight:800;font-style:italic;color:#fff;
  line-height:1;letter-spacing:-.02em;
  margin:0 1px;
}
@keyframes flash-bright{
  0%{color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.9),0 0 40px rgba(255,255,255,0.4)}
  100%{color:#fff;text-shadow:none}
}

/* SECTION HEADER */
.sec-header{margin-bottom:56px}
.sec-h2{
  font-family:var(--font-h);font-size:clamp(40px,4.5vw,64px);
  font-weight:800;font-style:italic;text-transform:uppercase;
  letter-spacing:-.01em;line-height:.95;color:#fff;
}
.sec-sub{
  font-size:16px;font-weight:300;color:var(--text-dim);
  margin-top:12px;max-width:560px;line-height:1.6;
}

/* TRAININGS */
#trainings{padding:112px 0;background:var(--bg)}
.training-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.t-card{background:var(--bg3);padding:28px 22px;display:flex;flex-direction:column;position:relative;overflow:visible}
.t-badge-top{
  position:absolute;top:-1px;right:-1px;
  z-index:2;
}
.t-cat{
  font-family:var(--font-h);font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;
}
.t-pain{font-size:12px;color:#444;font-style:italic;margin-bottom:18px;line-height:1.4}
.t-main{padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.07)}
.t-badge{
  display:inline-block;font-family:var(--font-h);
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:#fff;background:rgba(18,18,18,0.97);
  border:1px solid rgba(255,255,255,0.6);
  padding:5px 12px;
  box-shadow:0 0 8px rgba(255,255,255,0.25),0 0 20px rgba(255,255,255,0.1),inset 0 0 6px rgba(255,255,255,0.03);
  white-space:nowrap;
}
.t-badge:empty{display:none}
.t-program-name{
  font-family:var(--font-h);font-size:20px;font-weight:800;
  font-style:italic;text-transform:uppercase;color:#fff;
  margin-bottom:7px;line-height:1;
}
.t-program-desc{font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:8px}
.t-program-meta{font-size:11px;color:#444;line-height:1.6}
.t-also-title{
  font-size:10px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:#555;margin-bottom:10px;
}
.t-also-list{list-style:none;display:flex;flex-direction:row;flex-wrap:wrap;gap:6px}
.t-also-list li{
  font-size:11px;color:#bbb;
  display:flex;align-items:center;
  padding:4px 10px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.04);
  letter-spacing:.03em;
}
.t-level{display:none}

/* CLUBS */
#clubs{padding:112px 0;background:var(--bg2)}
.clubs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:44px}
.c-card{background:var(--bg3);overflow:hidden;display:flex;flex-direction:column;transition:transform .3s}
.c-card:hover{transform:translateY(-3px)}
.c-img{
  height:260px;overflow:hidden;position:relative;
  background:var(--bg4);
  background-image:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,0.012) 8px,rgba(255,255,255,0.012) 9px);
}
.c-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s;filter:brightness(.8)}
.c-card:hover .c-img img{transform:scale(1.04)}
.c-img-ph{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-h);font-size:12px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:#2a2a2a;
}
.c-body{padding:24px 24px 28px;flex:1;display:flex;flex-direction:column}
.c-name{
  font-family:var(--font-h);font-size:22px;font-weight:700;
  font-style:italic;text-transform:uppercase;color:#fff;
  margin-bottom:4px;line-height:1.1;
}
.c-addr{font-size:13px;color:var(--text-dim);margin-bottom:12px}
.c-desc{font-size:14px;color:var(--text-dim);line-height:1.55;margin-bottom:14px}
.c-feats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.c-feat{
  font-size:11px;color:var(--text-dim);
  border:1px solid rgba(255,255,255,0.1);
  padding:3px 9px;letter-spacing:.03em;
}
.c-price-row{
  display:flex;align-items:baseline;gap:10px;
  margin-bottom:18px;padding-top:14px;
  border-top:1px solid var(--border);
}
.c-price-main{
  font-family:var(--font-h);font-size:18px;font-weight:700;color:#fff;
}
.c-price-year{font-size:12px;color:var(--text-dim)}
.c-link{
  margin-top:auto;font-family:var(--font-h);font-size:13px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:#fff;
  text-decoration:none;display:flex;align-items:center;gap:6px;
  transition:gap .2s;opacity:.7;
}
.c-link:hover{gap:10px;opacity:1}
.clubs-cta{text-align:center}
.clubs-cta-hint{font-size:13px;color:var(--text-dim);margin-top:12px}
.btn-fill{
  display:inline-flex;align-items:center;gap:8px;
  background:#fff;border:none;color:#000;
  font-family:var(--font-h);font-size:15px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  padding:15px 36px;cursor:pointer;transition:background .15s;
}
.btn-fill:hover{background:#ddd}
.btn-out-w{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff;
  font-family:var(--font-h);font-size:15px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  padding:15px 36px;cursor:pointer;transition:all .15s;
}
.btn-out-w:hover{border-color:#fff}

/* APP */
#app{padding:112px 0;background:var(--bg)}
.app-grid{display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:center}
.app-features{display:flex;flex-direction:column;gap:32px;margin-top:40px}
.app-feat{display:flex;gap:20px;align-items:flex-start}
.app-feat-num{
  font-family:var(--font-h);font-size:18px;font-weight:700;
  font-style:italic;color:rgba(255,255,255,0.2);flex-shrink:0;padding-top:2px;
}
.app-feat-title{
  font-family:var(--font-h);font-size:20px;font-weight:700;
  font-style:italic;text-transform:uppercase;color:#fff;
  margin-bottom:5px;line-height:1;
}
.app-feat-text{font-size:14px;color:var(--text-dim);line-height:1.6}
.app-stores{display:flex;gap:10px;margin-top:28px}
.store-btn{
  border:1px solid rgba(255,255,255,0.2);background:transparent;color:var(--text-mid);
  font-family:var(--font-b);font-size:12px;font-weight:400;letter-spacing:.05em;
  text-transform:uppercase;padding:10px 20px;cursor:pointer;transition:all .15s;
}
.store-btn:hover{border-color:#fff;color:#fff}
.app-phone{
  width:240px;height:490px;border:1px solid rgba(255,255,255,0.1);
  border-radius:32px;background:var(--bg3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  margin:0 auto;position:relative;overflow:hidden;
  background-image:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,0.012) 8px,rgba(255,255,255,0.012) 9px);
}
.app-phone::before{
  content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:64px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;
}
.app-phone-lbl{font-family:var(--font-h);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#2a2a2a}

/* REVIEWS */
#reviews{padding:112px 0;background:var(--bg2)}
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.rev-card{background:var(--bg3);padding:32px 28px}
.rev-avatar{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-h);font-size:14px;font-weight:700;
  color:var(--text-mid);margin-bottom:16px;
}
.rev-name{font-size:14px;font-weight:500;color:#fff;margin-bottom:3px}
.rev-club{font-size:11px;color:var(--text-dim);letter-spacing:.04em;margin-bottom:10px}
.rev-stars{color:#fff;font-size:13px;letter-spacing:3px;margin-bottom:14px;opacity:.7}
.rev-text{font-size:14px;color:var(--text-dim);line-height:1.7;font-style:italic}

/* FAQ */
#faq{padding:112px 0;background:var(--bg)}
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:56px}
.faq-item{border-top:1px solid var(--border)}
.faq-q{
  width:100%;background:none;border:none;text-align:left;
  display:flex;align-items:flex-start;justify-content:space-between;gap:20px;
  padding:24px 32px;cursor:pointer;
  font-family:var(--font-h);font-size:20px;font-weight:700;
  font-style:italic;text-transform:uppercase;color:#fff;line-height:1.15;
  transition:color .15s;
}
.faq-q:hover{color:#bbb}
.faq-icon{
  flex-shrink:0;width:22px;height:22px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:monospace;font-size:15px;color:var(--text-dim);margin-top:2px;
  transition:all .2s;
}
.faq-item.open .faq-icon{background:#fff;border-color:#fff;color:#000}
.faq-a{overflow:hidden;max-height:0;transition:max-height .3s ease,padding .25s;padding:0 32px}
.faq-item.open .faq-a{max-height:300px;padding:0 32px 24px}
.faq-a-inner{
  font-size:15px;color:var(--text-dim);line-height:1.7;
  border-left:2px solid rgba(255,255,255,0.2);padding-left:14px;
}

/* FINAL CTA */
#final{
  padding:140px 0;background:var(--bg2);text-align:center;
  position:relative;overflow:hidden;
}
#final::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 800px 500px at 50% 50%,rgba(255,255,255,0.03) 0%,transparent 70%);
}
.final-h2{
  font-family:var(--font-h);font-size:clamp(44px,6vw,84px);
  font-weight:800;font-style:italic;text-transform:uppercase;
  line-height:.95;color:#fff;margin-bottom:16px;
}
.final-sub{
  font-size:17px;font-weight:300;color:var(--text-dim);
  max-width:500px;margin:0 auto 44px;line-height:1.65;
}
.final-form{max-width:320px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.final-risks{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:28px;margin-top:24px}
.risk{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.risk::before{content:'✓';color:#fff;font-size:12px;opacity:.5}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:32px 0;background:var(--bg)}
.footer-row{display:flex;align-items:center;justify-content:space-between}
.footer-logo{
  font-family:var(--font-h);font-size:18px;font-weight:800;
  font-style:italic;letter-spacing:.04em;text-transform:uppercase;color:#fff;
  opacity:.4;
}
.footer-copy{font-size:12px;color:var(--text-dim)}

/* POPUP */
.popup-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);animation:fin .25s ease;
}
.popup-box{
  background:var(--bg3);border:1px solid rgba(255,255,255,0.12);
  padding:40px 32px 32px;max-width:360px;width:90%;
  position:relative;animation:fup .3s ease;
}
.popup-close{
  position:absolute;top:12px;right:16px;background:none;border:none;
  color:var(--text-dim);font-size:22px;cursor:pointer;padding:4px;
  line-height:1;transition:color .15s;
}
.popup-close:hover{color:#fff}
.popup-ey{
  font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:8px;
}
.popup-h{
  font-family:var(--font-h);font-size:28px;font-weight:800;
  font-style:italic;text-transform:uppercase;line-height:1.1;color:#fff;margin-bottom:8px;
}
.popup-gift{
  font-size:13px;color:var(--text-dim);
  border-left:2px solid rgba(255,255,255,0.2);
  padding-left:12px;margin-bottom:20px;line-height:1.5;
}
.popup-form{display:flex;flex-direction:column;gap:10px}

/* FLOATING */
.float-btn{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99;
  background:#fff;color:#000;border:none;
  font-family:var(--font-h);font-size:14px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  padding:14px 28px;cursor:pointer;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.6);transition:all .3s;
}

function LiveCounter() {
  const [count, setCount] = useState(8253);

  useEffect(() => {
    const tick = () => {
      const delta = Math.floor(Math.random() * 13) - 4;
      setCount(prev => {
        const next = prev + delta;
        if (next < 8190) return 8190 + Math.floor(Math.random() * 5);
        if (next > 8500) return 8500 - Math.floor(Math.random() * 5);
        return next;
      });
      setTimeout(tick, 4000 + Math.random() * 6000);
    };
    const t = setTimeout(tick, 4000 + Math.random() * 4000);
    return () => clearTimeout(t);
  }, []);

  return <span>{count.toLocaleString('ru-RU')}</span>;
}

        </div>
        <div className="rev-grid">
          {REVIEWS.map((r, i) => <div key={i} className="rev-card">
              <div className="rev-avatar">{r.ini}</div>
              <div className="rev-name">{r.name}</div>
              <div className="rev-club">Клуб: Invictus {r.club}</div>
              <div className="rev-stars">★★★★★</div>
              <p className="rev-text">«{r.text}»</p>
            </div>
          )}
        </div>
      </div>
    </section>

    {/* FAQ */}
    <section id="faq">
      <div className="wrap">
        <h2 className="sec-h2">Частые вопросы</h2>
        <div className="faq-grid">
          {FAQS.map((f, i) =>
          <div key={i} className={`faq-item${openFaq === i ? ' open' : ''}`}>
              <button className="faq-q" onClick={() => setOpenFaq(openFaq === i ? null : i)}>
                <span>{f.q}</span>
                <span className="faq-icon">{openFaq === i ? '−' : '+'}</span>
              </button>
              <div className="faq-a">
                <div className="faq-a-inner">{f.a}</div>
              </div>
            </div>
          )}
        </div>
      </div>
    </section>

    {/* FINAL CTA */}
    <section id="final" ref={finalRef}>
      <div className="wrap">
        <h2 className="final-h2">Посмотрите —<br />и решите сами.</h2>
        <p className="final-sub">Оставьте заявку на экскурсию. Менеджер перезвонит за 15 минут и подберёт клуб рядом с домом или работой.</p>
        <div className="final-form">
          <LeadForm btnText={`${tweaks.ctaText} →`} />
        </div>
        <div className="final-risks">
          <span className="risk">Без предоплаты</span>
          <span className="risk">Без обязательств</span>
          <span className="risk"></span>
        </div>
      </div>
    </section>

    {/* FOOTER */}
    <footer>
      <div className="wrap">
        <div className="footer-row">
          <div className="footer-logo">Invictus Fitness</div>
          <div className="footer-copy">© 2026 ТОО Invictus Fitness · Алматы</div>
        </div>
      </div>
    </footer>

    {/* POPUP */}
    {popup &&
    <div className="popup-bg" onClick={(e) => e.target === e.currentTarget && setPopup(false)}>
        <div className="popup-box">
          <button className="popup-close" onClick={() => setPopup(false)}>×</button>
          <div className="popup-ey">Пока вы смотрите</div>
          <div className="popup-h">Запишитесь на бесплатную экскурсию</div>
          <div className="popup-gift">В подарок — замер InBody</div>
          <div className="popup-form"><LeadForm btnText="Хочу экскурсию →" /></div>
        </div>
      </div>
    }

    {/* FLOATING */}
    <button className={`float-btn${floatOn ? '' : ' off'}`} onClick={scrollToFinal}>
      {tweaks.ctaText} →
    </button>

    {/* TWEAKS */}
    {tweaksOpen &&
    <div className="tweaks-panel">
        <div className="tw-title">Tweaks</div>
        <div className="tw-row">
          <div className="tw-label">Бейдж (A/B тест)</div>
          <div className="tw-toggle">
            {['A', 'B', 'C'].map((v) =>
          <button key={v} className={tweaks.badge === v ? 'on' : ''} onClick={() => setTweak('badge', v)}>{v}</button>
          )}
          </div>
        </div>
        <div className="tw-row">
          <div className="tw-label">Подзаголовок</div>
          <select className="tw-sel" value={tweaks.heroSub} onChange={(e) => setTweak('heroSub', e.target.value)}>
            <option>Фитнес, достойный вашего времени.</option>
            <option>Оборудование Technogym. Тренеры с опытом.</option>
            <option>Не просто зал. Среда для роста.</option>
          </select>
        </div>
        <div className="tw-row">
          <div className="tw-label">Текст кнопок</div>
          <select className="tw-sel" value={tweaks.ctaText} onChange={(e) => setTweak('ctaText', e.target.value)}>
            <option>Записаться на экскурсию</option>
            <option>Оставить заявку</option>
            <option>Хочу в клуб</option>
          </select>
        </div>
      </div>
    }
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
